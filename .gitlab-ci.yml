stages:
  - deploy

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash openssh-client

variables:
  NODE_MAJOR: "20"
  NGINX_SITE_NAME: "perplexity-proxy"
  TARGET_DIR_MAIN: "/var/www/perplexity-proxy-main"
  TARGET_DIR_DEVELOP: "/var/www/perplexity-proxy-develop"
  APP_PORT_MAIN: "3001"
  APP_PORT_DEVELOP: "3002"
  DOMAIN_MAIN: "gpt.jall.lat"
  DOMAIN_DEVELOP: "gpt-dev.jall.lat"
  PM2_NAME_MAIN: "perplexity-proxy-main"
  PM2_NAME_DEVELOP: "perplexity-proxy-develop"
  RUN_PLAYWRIGHT_INSTALL: "true"

deploy_to_vps:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
  before_script:
    - apk add --no-cache bash openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
        echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" > ~/.ssh/known_hosts
      fi
    - chmod 644 ~/.ssh/known_hosts
  script:
    - bash perplexity-proxy/scripts/gitlab-deploy.sh
  environment:
    name: $CI_COMMIT_BRANCH
